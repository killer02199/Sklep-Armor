<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklep Armor - Logowanie</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #080808;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        
        .hero-bg {
            display: none;
        }

        @keyframes bgPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.1); }
        }

        
        .particles {
            display: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 212, 255, 0.8);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }

        .particle:nth-child(2) { left: 20%; animation-delay: 2s; background: rgba(0, 255, 136, 0.8); box-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }
        .particle:nth-child(3) { left: 40%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 60%; animation-delay: 6s; background: rgba(0, 255, 136, 0.8); box-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }
        .particle:nth-child(5) { left: 80%; animation-delay: 8s; }
        .particle:nth-child(6) { left: 10%; animation-delay: 1s; background: rgba(0, 255, 136, 0.8); box-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }
        .particle:nth-child(7) { left: 30%; animation-delay: 3s; }
        .particle:nth-child(8) { left: 50%; animation-delay: 5s; background: rgba(0, 255, 136, 0.8); box-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }
        .particle:nth-child(9) { left: 70%; animation-delay: 7s; }
        .particle:nth-child(10) { left: 90%; animation-delay: 9s; background: rgba(0, 255, 136, 0.8); box-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .login-container {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.9),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 30px 100px rgba(0, 0, 0, 1), inset 0 0 80px rgba(0, 0, 0, 1); }
            50% { box-shadow: 0 30px 100px rgba(0, 0, 0, 1), inset 0 0 80px rgba(0, 0, 0, 1); }
        }

        .login-container::before {
            display: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .shield-icon {
            font-size: 60px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: iconPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.5));
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0, 255, 136, 0.7)); }
        }

        .logo {
            font-family: 'Michroma', sans-serif;
            font-size: 32px;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #00ff88);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: shine 3s linear infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: #555;
            margin-bottom: 40px;
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #5865F2, #4752C4, #5865F2);
            background-size: 200% 100%;
            color: white;
            padding: 18px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 
                0 5px 25px rgba(88, 101, 242, 0.3),
                0 0 20px rgba(88, 101, 242, 0.1);
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-btn:hover {
            background-position: 100% 0;
            transform: translateY(-3px);
            box-shadow: 
                0 10px 35px rgba(88, 101, 242, 0.4),
                0 0 30px rgba(88, 101, 242, 0.2);
        }

        .discord-btn i {
            font-size: 24px;
        }

        .info {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
        }

        .info h3 {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            color: #444;
            font-size: 13px;
        }

        .info-item i {
            color: #00d4ff;
            font-size: 12px;
        }

        .info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
        }

        .error-box {
            background: rgba(255, 85, 85, 0.1);
            border: 1px solid rgba(255, 85, 85, 0.4);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            color: #ff5555;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.1);
            animation: shake 0.5s ease-in-out;
            position: relative;
            z-index: 1;
        }

        .error-box.noaccess {
            background: rgba(255, 170, 0, 0.1);
            border-color: rgba(255, 170, 0, 0.4);
            color: #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer {
            margin-top: 30px;
            color: #333;
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .footer span {
            color: #00ff88;
        }

        
        .login-container::after {
            display: none;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        
        .login-container {
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        
        .scanlines {
            display: none;
        }

        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #00d4ff;
            font-size: 18px;
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .geo-shape {
            position: absolute;
            opacity: 0.1;
            animation: geoFloat 20s infinite linear;
        }

        .geo-shape.hexagon {
            width: 60px;
            height: 34px;
            background: #00d4ff;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            top: 20%;
            right: 10%;
        }

        .geo-shape.triangle {
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 52px solid #00ff88;
            bottom: 15%;
            left: 8%;
        }

        @keyframes geoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        
        .subtitle .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #00ff88;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        
        .discord-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .discord-btn:hover::before {
            left: 100%;
        }

        
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            color: #666;
            font-size: 13px;
        }

        .info-item i {
            color: #00d4ff;
            font-size: 12px;
        }

        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.98), rgba(13, 13, 13, 0.98));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.1);
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            font-size: 24px;
            color: #00ff88;
            margin-right: 15px;
        }

        .toast-content {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body oncontextmenu="return false">
    <div class="hero-bg"></div>
    
    <!-- Floating particles -->
    <!-- Scan lines -->
    <div class="scanlines"></div>
    
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">ŁĄCZENIE Z DISCORD...</div>
    </div>
    
    <!-- Toast notification -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle toast-icon"></i>
            <span>Przekierowywanie do Discord...</span>
        </div>
    </div>
    
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <!-- Geometric shapes -->
    <div class="geo-shape hexagon"></div>
    <div class="geo-shape triangle"></div>
    
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                (e.ctrlKey && e.key === 'u') ||
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                return false;
            }
        });
    </script>
    
    <div class="login-container">
        <i class="fas fa-shield-alt shield-icon"></i>
        <div class="logo">SKLEP ARMOR</div>
        <p class="subtitle">🔒 Dostęp wyłącznie dla uprzywilejowanych</p>

        <div id="errorMessage"></div>

        <a href="/auth/discord" class="discord-btn" id="discordBtn" onclick="showLoading()">
            <i class="fab fa-discord"></i>
            Zaloguj przez Discord
        </a>

        <div class="info">
            <h3><i class="fas fa-info-circle"></i> Wymagania</h3>
            <div class="info-item"><i class="fas fa-chevron-right"></i> Członkostwo na serwerze Discord</div>
            <div class="info-item"><i class="fas fa-chevron-right"></i> Rola uprzywilejowana na serwerze</div>
            <div class="info-item"><i class="fas fa-chevron-right"></i> Aktywne konto Discord</div>
        </div>

        <div class="footer">
            Made by <span>killer02</span> 💚
        </div>
    </div>

    <script>

        const container = document.querySelector('.login-container');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            container.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('active');

            setTimeout(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }, 500);
        }

        const subtitleText = '🔒 Dostęp wyłącznie dla uprzywilejowanych';
        const subtitleEl = document.querySelector('.subtitle');
        let charIndex = 0;
        
        function typeText() {
            if (charIndex < subtitleText.length) {
                subtitleEl.innerHTML = subtitleText.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeText, 50);
            }
        }

        setTimeout(typeText, 1000);

        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const errorDiv = document.getElementById('errorMessage');

        if (error === 'noaccess') {
            errorDiv.innerHTML = '<div class="error-box noaccess"><i class="fas fa-exclamation-triangle"></i> Nie posiadasz wymaganej roli na serwerze Discord!</div>';
        } else if (error === 'unauthorized') {
            errorDiv.innerHTML = '<div class="error-box"><i class="fas fa-lock"></i> Musisz się zalogować przez Discord!</div>';
        } else if (error === 'authfailed') {
            errorDiv.innerHTML = '<div class="error-box"><i class="fas fa-times-circle"></i> Wystąpił błąd podczas autoryzacji. Spróbuj ponownie.</div>';
        }
    </script>
</body>
</html>
